[build]
  functions = "functions"
  publish = "uploads"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/server/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api-docs/*"
  to = "/.netlify/functions/server/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/images/*"
  to = "/uploads/:splat"
  status = 200